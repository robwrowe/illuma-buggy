    {/* Tab content */}
    <div style={{flex:1,overflow:'hidden'}}>
      {tab==='map'        && <MapZonesTab data={data} update={update} mapsReady={mapsReady}/>}
      {tab==='presets'    && <PresetsTab data={data} update={update}/>}
      {tab==='palettes'   && <PalettesTab data={data} update={update}/>}
      {tab==='brightness' && <BrightnessTab data={data} update={update}/>}
      {tab==='settings'   && <SettingsTab data={data} update={update}/>}
    </div>

    {/* API Key modal */}
    {showKeyModal && (<div style={{position:'fixed',inset:0,background:'#000000cc',display:'flex',alignItems:'center',justifyContent:'center',zIndex:3000}}>
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:16,padding:28,width:440,display:'flex',flexDirection:'column',gap:16}}>
        <div style={{fontSize:18,fontWeight:700}}>🔑 Google Maps API Key</div>
        <div style={{fontSize:13,color:'var(--text2)',lineHeight:'1.6'}}>
          Stored only in your browser. Get a key at <a href="https://console.cloud.google.com/google/maps-apis" target="_blank" style={{color:'var(--primary)'}}>Google Cloud Console</a> — enable Maps JavaScript API and Geocoding API.
        </div>
        <input value={keyInput} onChange={e=>setKeyInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&saveMapsKey()}
          placeholder="AIza..." style={{...inputStyle,fontFamily:'monospace',fontSize:13}} autoFocus/>
        <div style={{display:'flex',gap:8}}>
          {mapsKey && <button onClick={()=>setShowKeyModal(false)} style={btn('',{flex:1})}>Cancel</button>}
          <button onClick={saveMapsKey} disabled={!keyInput.trim()} style={btn('primary',{flex:1})}>Save & Load Map</button>
        </div>
      </div>
    </div>)}

    {showBoardSync && <BoardSyncModal data={data} onClose={() => setShowBoardSync(false)}/>}

    {/* Profiles modal */}
    {showProfiles && <Modal title="🗂 Profiles" onClose={() => setShowProfiles(false)} width={460}>
      <p style={{fontSize:12,color:'var(--text3)'}}>
        Profiles save your full config (zones, presets, segment layouts, settings) to a named slot in browser storage.
        Perfect for separate configs per park — load one before you leave the house.
      </p>
      <div style={{display:'flex',gap:8}}>
        <input value={newProfileName} onChange={e => setNewProfileName(e.target.value)}
          onKeyDown={e => e.key==='Enter' && saveProfile()}
          placeholder="Profile name (e.g. Magic Kingdom)"
          style={{...inputStyle,flex:1}}/>
        <button onClick={saveProfile} style={btn('primary')}>Save</button>
      </div>
      {Object.keys(profiles).length === 0
        ? <div style={{textAlign:'center',color:'var(--text3)',padding:'16px 0',fontSize:13}}>No profiles saved yet</div>
        : Object.entries(profiles).map(([name, prof]) => (
          <div key={name} style={{...cardStyle,display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:14}}>{name}</div>
              <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>
                {prof.presets?.length||0} presets · {prof.zones?.length||0} zones · {prof.customSegmentLayouts?.length||0} layouts
                {prof.savedAt && ' · ' + new Date(prof.savedAt).toLocaleDateString()}
              </div>
            </div>
            <button onClick={() => loadProfile(name)} style={btn('primary',{fontSize:12})}>Load</button>
            <button onClick={() => {
              const updated = {...profiles, [name]: {...data, savedAt: new Date().toISOString()}};
              setProfiles(updated); localStorage.setItem(LS_PROFILES, JSON.stringify(updated));
            }} style={btn('',{fontSize:12})}>Update</button>
            <button onClick={() => deleteProfile(name)} style={btn('danger',{fontSize:12})}>✕</button>
          </div>
        ))
      }
    </Modal>}
  </div>;
}

// ── Map & Zones ────────────────────────────────────────────────────────
function MapZonesTab({data, update}) {
  const gmap     = useRef(null);
  const mapDiv   = useRef(null);
  const zonePoly = useRef([]);
  const pinMarkers = useRef([]);
  const previewPoly = useRef(null);
  const editPinMarkers = useRef([]);
  const editPreviewPoly = useRef(null);

  const [drawMode, setDrawMode] = useState('none');
  const [insertMode, setInsertMode] = useState(false);
  const [drawPoints, setDrawPoints] = useState([]);
  const [editPoints, setEditPoints] = useState([]);
  const [editInsertMode, setEditInsertMode] = useState(false);
  const [showForm, setShowForm] = useState(false);
  const [formName, setFormName] = useState('');
  const [formPreset, setFormPreset] = useState('');
  const [editZone, setEditZone] = useState(null);
  const [editIndoor, setEditIndoor] = useState(null);
  const [mapType, setMapType] = useState('satellite');
  const [locationSearch, setLocationSearch] = useState('');
  const [searching, setSearching] = useState(false);
  const [mapReady, setMapReady] = useState(false);
  const [highlightZoneId, setHighlightZoneId] = useState(null);
  const didFitAllRef = useRef(false);

  const presetOptions = useMemo(() => presetSelectOptions(data.presets), [data.presets]);

  // Keep refs current to use inside Google Maps callbacks
  const drawModeRef  = useRef('none');
  const drawPtsRef   = useRef([]);
  drawModeRef.current = drawMode;
  drawPtsRef.current  = drawPoints;
  const insertModeRef = useRef(false);
  insertModeRef.current = insertMode;
  const editPtsRef = useRef([]);
  const editInsertModeRef = useRef(false);
  const editingActiveRef = useRef(false);
  editPtsRef.current = editPoints;
  editInsertModeRef.current = editInsertMode;
  editingActiveRef.current = !!(editZone || editIndoor);

  const addDrawPointRef = useRef((lat, lng) => {});
  addDrawPointRef.current = (lat, lng) => {
    if (drawModeRef.current === 'none') return;
    const pts = drawPtsRef.current;
    if (insertModeRef.current && pts.length >= 2) {
      let bestIdx = 0, bestDist = Infinity;
      for (let i = 0; i < pts.length; i++) {
        const a = pts[i], b = pts[(i + 1) % pts.length];
        const midLat = (a.lat + b.lat) / 2, midLng = (a.lng + b.lng) / 2;
        const d = Math.pow(lat - midLat, 2) + Math.pow(lng - midLng, 2);
        if (d < bestDist) { bestDist = d; bestIdx = i; }
      }
      setDrawPoints(prev => {
        const u = [...prev];
        u.splice(bestIdx + 1, 0, { lat, lng });
        return u;
      });
    } else {
      setDrawPoints(prev => [...prev, { lat, lng }]);
    }
  };

  const openZoneEdit = (zone) => {
    const paths = normalizePolygon(zone.polygon);
    setHighlightZoneId(zone.id);
    setEditZone({ ...zone, polygon: paths });
    setEditIndoor(null);
    setEditPoints(paths.map(p => ({ ...p })));
    setEditInsertMode(false);
    focusMapOnPolygon(gmap, paths);
  };

  const openIndoorEdit = (zone) => {
    const paths = normalizePolygon(zone.polygon);
    setHighlightZoneId(zone.id);
    setEditIndoor({ ...zone, polygon: paths });
    setEditZone(null);
    setEditPoints(paths.map(p => ({ ...p })));
    setEditInsertMode(false);
    focusMapOnPolygon(gmap, paths);
  };

  const closeZoneEdit = () => {
    setEditZone(null);
    setEditIndoor(null);
    setEditPoints([]);
    setEditInsertMode(false);
  };

  // Init map
  useEffect(() => {
    if (!window.google || gmap.current) return;
    const waitForMaps = setInterval(() => {
      if (!window.google?.maps) return;
      clearInterval(waitForMaps);
      gmap.current = new google.maps.Map(mapDiv.current, {
        center:{lat:28.4177,lng:-81.5812}, zoom:15,
        mapTypeId:'satellite',
        mapTypeControl:false, streetViewControl:false,
        fullscreenControlOptions:{position:google.maps.ControlPosition.TOP_LEFT},
      });
      setMapReady(true);
      gmap.current.addListener('click', e => {
        const lat = e.latLng.lat(), lng = e.latLng.lng();
        if (editingActiveRef.current) {
          const pts = editPtsRef.current;
          if (editInsertModeRef.current && pts.length >= 2) {
            let bestIdx = 0, bestDist = Infinity;
            for (let i = 0; i < pts.length; i++) {
              const a = pts[i], b = pts[(i + 1) % pts.length];
              const midLat = (a.lat + b.lat) / 2, midLng = (a.lng + b.lng) / 2;
              const d = Math.pow(lat - midLat, 2) + Math.pow(lng - midLng, 2);
              if (d < bestDist) { bestDist = d; bestIdx = i; }
            }
            setEditPoints(prev => {
              const u = [...prev];
              u.splice(bestIdx + 1, 0, { lat, lng });
              return u;
            });
          } else {
            setEditPoints(prev => [...prev, { lat, lng }]);
          }
          return;
        }
        if (drawModeRef.current === 'none') return;
        addDrawPointRef.current(lat, lng);
      });
    }, 200);
    return () => clearInterval(waitForMaps);
  }, []);

  // Redraw zone polygons
  useEffect(() => {
    if (!gmap.current || !mapReady) return;
    zonePoly.current.forEach(p => p.setMap(null));
    zonePoly.current = [];
    const COLORS = ['#a78bfa','#22c55e','#f59e0b','#ef4444','#06b6d4','#f97316','#ec4899','#14b8a6'];
    data.zones.forEach((z,i) => {
      if (editZone?.id === z.id) return;
      const paths = normalizePolygon(z.polygon);
      if (paths.length < 3) return;
      const c = COLORS[i % COLORS.length];
      const highlighted = highlightZoneId === z.id;
      const poly = new google.maps.Polygon({
        paths,
        fillColor:c, fillOpacity: highlighted ? 0.35 : 0.2,
        strokeColor: z.enabled ? c : '#666',
        strokeWeight: highlighted ? 4 : 2,
        map:gmap.current,
        zIndex: highlighted ? 2 : 1,
      });
      poly.addListener('click', (e) => {
        if (drawModeRef.current !== 'none') {
          addDrawPointRef.current(e.latLng.lat(), e.latLng.lng());
          return;
        }
        openZoneEdit({ ...z, polygon: paths });
      });
      zonePoly.current.push(poly);
    });
    data.indoorZones.forEach(z => {
      if (editIndoor?.id === z.id) return;
      const paths = normalizePolygon(z.polygon);
      if (paths.length < 3) return;
      const highlighted = highlightZoneId === z.id;
      const poly = new google.maps.Polygon({
        paths,
        fillColor:'#60a5fa', fillOpacity: highlighted ? 0.28 : 0.15,
        strokeColor: z.enabled ? '#60a5fa' : '#666',
        strokeWeight: highlighted ? 4 : 2,
        map:gmap.current,
        zIndex: highlighted ? 2 : 1,
      });
      poly.addListener('click', (e) => {
        if (drawModeRef.current !== 'none') {
          addDrawPointRef.current(e.latLng.lat(), e.latLng.lng());
          return;
        }
        openIndoorEdit({ ...z, polygon: paths });
      });
      zonePoly.current.push(poly);
    });
  }, [data.zones, data.indoorZones, mapReady, highlightZoneId, editZone?.id, editIndoor?.id]);

  // Fit map to all zones once when map first becomes ready
  useEffect(() => {
    if (!mapReady || !gmap.current || didFitAllRef.current) return;
    const all = [...data.zones, ...data.indoorZones];
    const polys = all.map(z => normalizePolygon(z.polygon)).filter(p => p.length >= 3);
    if (!polys.length) return;
    const bounds = new google.maps.LatLngBounds();
    polys.forEach(poly => poly.forEach(p => bounds.extend(p)));
    gmap.current.fitBounds(bounds, 80);
    didFitAllRef.current = true;
  }, [mapReady, data.zones, data.indoorZones]);

  // Redraw draggable pin markers
  useEffect(() => {
    if (!gmap.current || !mapReady) return;
    pinMarkers.current.forEach(m => m.setMap(null));
    pinMarkers.current = [];
    if (previewPoly.current) { previewPoly.current.setMap(null); previewPoly.current = null; }

    drawPoints.forEach((pt, i) => {
      const isLast = i === drawPoints.length - 1;
      const m = new google.maps.Marker({
        position:{lat:pt.lat,lng:pt.lng},
        map:gmap.current,
        draggable:true,
        label:{text:String(i+1),color:'#fff',fontWeight:'bold',fontSize:'11px'},
        icon:{
          path:google.maps.SymbolPath.CIRCLE,
          fillColor: isLast ? '#22c55e' : '#a78bfa',
          fillOpacity:1, strokeColor:'#fff', strokeWeight:2, scale:11,
        },
        zIndex:1000+i,
        title:`Pin ${i+1} — drag to move or right-click to delete`,
        cursor:'move',
      });
      // Drag to move
      m.addListener('dragend', e => {
        const lat = e.latLng.lat(), lng = e.latLng.lng();
        setDrawPoints(prev => { const u=[...prev]; u[i]={lat,lng}; return u; });
      });
      // Right-click to delete pin
      m.addListener('rightclick', () => {
        setDrawPoints(prev => prev.filter((_,j) => j!==i));
      });
      pinMarkers.current.push(m);
    });

    if (drawPoints.length >= 3) {
      previewPoly.current = new google.maps.Polygon({
        paths:drawPoints.map(p=>({lat:p.lat,lng:p.lng})),
        fillColor:'#a78bfa', fillOpacity:0.15,
        strokeColor:'#a78bfa', strokeWeight:2, strokeDashOffset:0,
        map:gmap.current,
      });
    }
  }, [drawPoints, mapReady]);

  // Draggable pins while editing an existing zone
  useEffect(() => {
    if (!gmap.current || !mapReady) return;
    editPinMarkers.current.forEach(m => m.setMap(null));
    editPinMarkers.current = [];
    if (editPreviewPoly.current) { editPreviewPoly.current.setMap(null); editPreviewPoly.current = null; }
    if (!editZone && !editIndoor) return;

    const stroke = editZone ? '#a78bfa' : '#60a5fa';
    editPoints.forEach((pt, i) => {
      const m = new google.maps.Marker({
        position: { lat: pt.lat, lng: pt.lng },
        map: gmap.current,
        draggable: true,
        label: { text: String(i + 1), color: '#fff', fontWeight: 'bold', fontSize: '11px' },
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          fillColor: '#f59e0b',
          fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2, scale: 11,
        },
        zIndex: 2000 + i,
        title: `Pin ${i + 1} — drag to move, right-click to delete`,
        cursor: 'move',
      });
      m.addListener('dragend', e => {
        const lat = e.latLng.lat(), lng = e.latLng.lng();
        setEditPoints(prev => { const u = [...prev]; u[i] = { lat, lng }; return u; });
      });
      m.addListener('rightclick', () => {
        setEditPoints(prev => (prev.length <= 3 ? prev : prev.filter((_, j) => j !== i)));
      });
      editPinMarkers.current.push(m);
    });

    if (editPoints.length >= 3) {
      editPreviewPoly.current = new google.maps.Polygon({
        paths: editPoints.map(p => ({ lat: p.lat, lng: p.lng })),
        fillColor: stroke, fillOpacity: 0.22,
        strokeColor: stroke, strokeWeight: 3,
        map: gmap.current,
        zIndex: 3,
      });
    }
  }, [editPoints, editZone, editIndoor, mapReady]);

  const flyToZone = (zone, isIndoor = false) => {
    setHighlightZoneId(zone.id);
    focusMapOnPolygon(gmap, zone.polygon);
    if (isIndoor) setEditIndoor(null);
    else setEditZone(null);
  };

  const commitZone = () => {
    if (!formName.trim()) return alert('Enter a name');
    if (drawMode === 'preset' && !formPreset) return alert('Select a preset');
    if (drawPoints.length < 3) return alert('Draw at least 3 points');
    if (drawMode === 'preset') {
      update({zones:[...data.zones,{id:generateId(),name:formName,polygon:normalizePolygon(drawPoints),presetId:formPreset,enabled:true}]});
    } else {
      update({indoorZones:[...data.indoorZones,{id:generateId(),name:formName,polygon:normalizePolygon(drawPoints),enabled:true}]});
    }
    setShowForm(false); setDrawPoints([]); setDrawMode('none'); setFormName(''); setFormPreset('');
  };

  const saveZoneEdit = () => {
    const poly = normalizePolygon(editPoints);
    if (poly.length < 3) return alert('Zone needs at least 3 points');
    if (editZone)   update({ zones: data.zones.map(z => z.id === editZone.id ? { ...editZone, polygon: poly } : z) });
    if (editIndoor) update({ indoorZones: data.indoorZones.map(z => z.id === editIndoor.id ? { ...editIndoor, polygon: poly } : z) });
    closeZoneEdit();
  };

  const deleteZoneEdit = () => {
    if (editZone)   update({ zones: data.zones.filter(z => z.id !== editZone.id) });
    if (editIndoor) update({ indoorZones: data.indoorZones.filter(z => z.id !== editIndoor.id) });
    closeZoneEdit();
  };

  const searchLocation = async () => {
    if (!locationSearch.trim() || !gmap.current) return;
    setSearching(true);
    try {
      const geocoder = new google.maps.Geocoder();
      geocoder.geocode({address: locationSearch}, (results, status) => {
        setSearching(false);
        if (status === 'OK' && results[0]) {
          const loc = results[0].geometry.location;
          gmap.current.setCenter(loc);
          gmap.current.setZoom(17);
          new google.maps.Marker({
            position:loc, map:gmap.current,
            title:results[0].formatted_address,
            icon:{path:google.maps.SymbolPath.BACKWARD_CLOSED_ARROW,scale:6,fillColor:'#f59e0b',fillOpacity:1,strokeColor:'#fff',strokeWeight:2},
          });
        } else {
          alert('Location not found. Try "Magic Kingdom, Orlando" or a full address.');
        }
      });
    } catch(e) { setSearching(false); alert('Search failed'); }
  };

  return (<div style={{display:'flex',height:'100%'}}>
    {/* Sidebar */}
    <div style={{width:editZone||editIndoor?280:240,background:'var(--surface)',borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',padding:12,gap:8,overflowY:'auto',flexShrink:0,transition:'width 0.15s ease'}}>

      {/* Zone edit — sidebar panel (no modal overlay; map stays interactive) */}
      {(editZone||editIndoor) && (<div style={{background:'var(--primary-dim)',border:'1px solid var(--primary)',borderRadius:10,padding:10,display:'flex',flexDirection:'column',gap:8,marginBottom:4}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontWeight:700,fontSize:13,color:'var(--primary)'}}>{editZone?'Edit Preset Zone':'Edit Indoor Zone'}</span>
          <button type="button" onClick={closeZoneEdit} title="Close" style={{background:'none',color:'var(--text3)',fontSize:18,lineHeight:1,cursor:'pointer',border:'none',padding:0}}>×</button>
        </div>
        <div style={{fontSize:11,color:'var(--text2)',lineHeight:1.45}}>
          Drag numbered pins on the map. Click map to add; right-click pin to remove (min 3).
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {editPoints.length >= 3 && (
            <button type="button" onClick={() => setEditInsertMode(v => !v)}
              style={btn(editInsertMode ? 'warning' : '', { fontSize: 11, padding: '4px 8px', borderColor: editInsertMode ? 'var(--warning)' : 'var(--border)', color: editInsertMode ? 'var(--warning)' : 'var(--text2)' })}>
              {editInsertMode ? '⊕ Insert on edge' : '⊕ Insert between'}
            </button>
          )}
          {editPoints.length > 0 && (
            <button type="button" onClick={() => setEditPoints(p => p.slice(0, -1))} style={btn('', { fontSize: 11, padding: '4px 8px' })}>↩ Undo</button>
          )}
          <button type="button" onClick={() => focusMapOnPolygon(gmap, editPoints)} style={btn('', { fontSize: 11, padding: '4px 8px' })}>Fit map</button>
          <span style={{fontSize:11,color:'var(--text3)',alignSelf:'center'}}>{editPoints.length} pin{editPoints.length !== 1 ? 's' : ''}</span>
        </div>
        {editZone && (<>
          <Field label="Name"><input value={editZone.name} onChange={e=>setEditZone({...editZone,name:e.target.value})} style={inputStyle}/></Field>
          <Field label="Preset">
            <SearchableSelect value={editZone.presetId} onChange={v => setEditZone({ ...editZone, presetId: v })}
              placeholder="Select preset…" allowEmpty={false} maxListHeight={200}
              options={presetOptions}/>
          </Field>
          <label style={{display:'flex',alignItems:'center',gap:8,fontSize:12,cursor:'pointer'}}>
            <input type="checkbox" checked={editZone.enabled} onChange={e=>setEditZone({...editZone,enabled:e.target.checked})} style={{width:16,height:16}}/>
            Enabled
          </label>
        </>)}
        {editIndoor && (<>
          <Field label="Name"><input value={editIndoor.name} onChange={e=>setEditIndoor({...editIndoor,name:e.target.value})} style={inputStyle}/></Field>
          <label style={{display:'flex',alignItems:'center',gap:8,fontSize:12,cursor:'pointer'}}>
            <input type="checkbox" checked={editIndoor.enabled} onChange={e=>setEditIndoor({...editIndoor,enabled:e.target.checked})} style={{width:16,height:16}}/>
            Enabled
          </label>
        </>)}
        <div style={{display:'flex'}}>
          <button type="button" onClick={deleteZoneEdit} style={btn('danger',{flex:1,fontSize:11,padding:'6px 4px'})}>Delete</button>
          <button type="button" onClick={closeZoneEdit} style={btn('',{flex:1,fontSize:11,padding:'6px 4px',marginLeft:6})}>Cancel</button>
          <button type="button" onClick={saveZoneEdit} style={btn('primary',{flex:1,fontSize:11,padding:'6px 4px',marginLeft:6})}>Save</button>
        </div>
      </div>)}

      {/* Location search */}
      <div style={{fontSize:11,fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:1}}>Search Location</div>
      <div style={{display:'flex',gap:4}}>
        <input value={locationSearch} onChange={e=>setLocationSearch(e.target.value)}
          onKeyDown={e=>e.key==='Enter' && searchLocation()}
          placeholder="e.g. Fantasyland" style={{...inputStyle,flex:1,padding:'6px 8px',fontSize:12}}/>
        <button onClick={searchLocation} disabled={searching}
          style={{...btn('primary',{padding:'6px 10px',fontSize:12})}}>
          {searching ? '…' : '🔍'}
        </button>
      </div>

      {/* Draw controls */}
      <div style={{fontSize:11,fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:1,marginTop:4}}>Draw Zone</div>
      {drawMode === 'none' ? (<>
        <button onClick={()=>setDrawMode('preset')} style={btn('primary',{width:'100%'})}>+ Preset Zone</button>
        <button onClick={()=>setDrawMode('indoor')} style={btn('',{width:'100%',color:'var(--indoor)',borderColor:'var(--indoor)'})}>+ Indoor Zone</button>
        <SearchableSelect value={mapType} onChange={v => { setMapType(v); gmap.current?.setMapTypeId(v); }}
          placeholder="Map type" allowEmpty={false}
          options={[
            { value: 'satellite', label: 'Satellite', searchText: 'satellite' },
            { value: 'hybrid', label: 'Hybrid', searchText: 'hybrid' },
            { value: 'roadmap', label: 'Roadmap', searchText: 'roadmap' },
          ]}/>
      </>) : (<>
        <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.5}}>
          Click map to place pins.<br/>
          <strong>Drag</strong> pins to reposition.<br/>
          <strong>Right-click</strong> pin to delete.
        </div>
        <div style={{fontSize:12,color:'var(--text3)'}}>{drawPoints.length} pin{drawPoints.length!==1?'s':''} placed</div>
        {drawPoints.length >= 3 && (<button onClick={()=>setInsertMode(v=>!v)}
          style={btn(insertMode?'warning':'',{width:'100%',marginBottom:4,fontSize:12,borderColor:insertMode?'var(--warning)':'var(--border)',color:insertMode?'var(--warning)':'var(--text2)'})}>
          {insertMode ? '⊕ Insert Mode ON — click to insert' : '⊕ Insert Between Pins'}
        </button>)}
        {drawPoints.length > 0 && (<button onClick={()=>setDrawPoints(p=>p.slice(0,-1))} style={btn('',{width:'100%',marginBottom:4,fontSize:12})}>↩ Undo Last</button>)}
        {drawPoints.length >= 3 && (<button onClick={()=>setShowForm(true)} style={btn('primary',{width:'100%',marginBottom:4,fontSize:12})}>✓ Done</button>)}
        <button onClick={()=>{setDrawMode('none');setDrawPoints([]);}} style={btn('danger',{width:'100%',fontSize:12})}>✕ Cancel</button>
      </>)}

      {/* Zone list */}
      <div style={{fontSize:11,fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:1,marginTop:8}}>Preset Zones ({data.zones.length})</div>
      {data.zones.length===0 && <div style={{fontSize:12,color:'var(--text3)'}}>None yet</div>}
      {data.zones.map((z,i) => {
        const COLORS=['#a78bfa','#22c55e','#f59e0b','#ef4444','#06b6d4','#f97316'];
        const c=COLORS[i%COLORS.length];
        const preset = data.presets.find(p => p.id === z.presetId);
        const highlighted = highlightZoneId === z.id;
        return (<div key={z.id}
          onClick={() => flyToZone(z)}
          style={{background: highlighted ? 'var(--primary-dim)' : 'var(--surface2)',borderRadius:8,padding:8,borderLeft:`3px solid ${c}`,cursor:'pointer',border: highlighted ? '1px solid var(--primary)' : '1px solid transparent'}}>
          <div style={{display:'flex',alignItems:'flex-start',gap:6}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:600}}>{z.name}</div>
              <div style={{fontSize:11,color:'var(--text3)'}}>{preset?.name || 'No preset'}</div>
              <div style={{fontSize:10,color:z.enabled?'var(--success)':'var(--text3)'}}>{z.enabled?'Enabled':'Disabled'}</div>
            </div>
            <button type="button" title="Edit zone" onClick={e => { e.stopPropagation(); openZoneEdit(z); }}
              style={btn('',{padding:'4px 8px',fontSize:11,flexShrink:0})}>✎</button>
          </div>
        </div>);
      })}
      <div style={{fontSize:11,fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:1,marginTop:4}}>Indoor Zones ({data.indoorZones.length})</div>
      {data.indoorZones.length===0 && <div style={{fontSize:12,color:'var(--text3)'}}>None yet</div>}
      {data.indoorZones.map(z => {
        const highlighted = highlightZoneId === z.id;
        return (<div key={z.id}
          onClick={() => flyToZone(z, true)}
          style={{background: highlighted ? 'var(--primary-dim)' : 'var(--surface2)',borderRadius:8,padding:8,borderLeft:'3px solid #60a5fa',cursor:'pointer',border: highlighted ? '1px solid var(--primary)' : '1px solid transparent'}}>
          <div style={{display:'flex',alignItems:'flex-start',gap:6}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:600}}>{z.name}</div>
              <div style={{fontSize:10,color:z.enabled?'var(--success)':'var(--text3)'}}>{z.enabled?'Enabled':'Disabled'}</div>
            </div>
            <button type="button" title="Edit zone" onClick={e => { e.stopPropagation(); openIndoorEdit(z); }}
              style={btn('',{padding:'4px 8px',fontSize:11,flexShrink:0})}>✎</button>
          </div>
        </div>);
      })}
    </div>

    {/* Map */}
    <div style={{flex:1,position:'relative'}}>
      <div ref={mapDiv} style={{width:'100%',height:'100%'}}/>
      {!window.MAPS_LOADED && <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'var(--surface)',color:'var(--text2)',fontSize:14}}>
        Loading Google Maps… (check your API key in index.html)
      </div>}
    </div>

    {/* Zone save form */}
    {showForm && (<Modal title={drawMode==='preset'?'New Preset Zone':'New Indoor Zone'} onClose={()=>setShowForm(false)}>
      <Field label="Name"><input value={formName} onChange={e=>setFormName(e.target.value)} placeholder={drawMode==='preset'?'e.g. Fantasyland':'e.g. Inside castle'} style={inputStyle} autoFocus/></Field>
      {drawMode==='preset' && (<Field label="Preset">
        {presetOptions.length === 0 ? (
          <div style={{fontSize:12,color:'var(--text3)'}}>No presets yet — create them on the Presets tab, then sync via 📡 Board.</div>
        ) : (
          <SearchableSelect value={formPreset} onChange={setFormPreset} placeholder="Select preset…"
            maxListHeight={280} options={presetOptions}/>
        )}
      </Field>)}
      <ModalBtns onCancel={()=>setShowForm(false)} onSave={commitZone}/>
    </Modal>)}
  </div>);
}


// ── Presets ────────────────────────────────────────────────────────────
function PresetsTab({data, update}) {
  const [sel, setSel]     = useState(null);
  const [isNew, setIsNew] = useState(false);
  const [ptab, setPtab]   = useState('effect');
  const [search, setSearch] = useState('');
  const [activeTag, setActiveTag] = useState(null);

  const filteredPresets = useMemo(
    () => (data.presets || []).filter(p => itemMatchesTagFilter(p, search, activeTag)),
    [data.presets, search, activeTag],
  );

  // WLED connection
  const [wledIp, setWledIp]       = useState(localStorage.getItem('wled-ip')||'4.3.2.1');
  const [wledStatus, setWledStatus] = useState('idle'); // idle | connecting | connected | error
  const [wledEffects, setWledEffects]   = useState([]);
  const [wledPalettes, setWledPalettes] = useState([]);
  const [effectFilter, setEffectFilter] = useState('');
  const [presetTestStatus, setPresetTestStatus] = useState('idle'); // idle | testing | ok | error
  const [presetTestErr, setPresetTestErr] = useState('');
  const [showCapture, setShowCapture] = useState(false);
  const [captureOpts, setCaptureOpts] = useState(() => ({ ...DEFAULT_WLED_CAPTURE_OPTS }));
  const [captureUpdateMemory, setCaptureUpdateMemory] = useState(true);
  const [capturing, setCapturing] = useState(false);
  const [captureErr, setCaptureErr] = useState('');

  useEffect(() => {
    const cached = loadCachedWledCatalog();
    if (cached.effects.length) setWledEffects(cached.effects);
    if (cached.palettes.length) setWledPalettes(cached.palettes);
    if (cached.effects.length || cached.palettes.length) setWledStatus('connected');
  }, []);

  const blank = () => ({
    id:generateId(), name:'', createdAt:Date.now(), tags: [],
    wled:{on:true,fx:undefined,fxName:'',pal:undefined,palName:'',sx:128,ix:128,c1:128,c2:128,c3:16,o1:false,o2:false,o3:false},
    memory:{effect:true,palette:true,parameters:true,color:false,segments:false},
  });

  const duplicatePreset = (p) => {
    const copy = {
      ...p,
      id: generateId(),
      name: duplicateTaggedName(p.name),
      tags: [...(p.tags || [])],
      createdAt: Date.now(),
      wled: JSON.parse(JSON.stringify(p.wled)),
      memory: { ...p.memory },
    };
    update({ presets: [...data.presets, copy] });
    setSel(copy);
    setIsNew(false);
    setPtab('effect');
  };

  const save = () => {
    if (!sel.name.trim()) return alert('Enter a name');
    update({presets: isNew ? [...data.presets, sel] : data.presets.map(p => p.id===sel.id ? sel : p)});
    setSel(null);
  };
  const del = id => { if(confirm('Delete this preset?')) { update({presets:data.presets.filter(p=>p.id!==id)}); setSel(null); }};
  const w = (k,v) => setSel(s => ({...s, wled:{...s.wled,[k]:v}}));
  const m = (k,v) => setSel(s => ({...s, memory:{...s.memory,[k]:v}}));

  const connectWled = async () => {
    if (!wledIp.trim()) return;
    localStorage.setItem('wled-ip', wledIp);
    setWledStatus('connecting');
    try {
      const { effects, palettes } = await fetchWledCatalog(wledIp);
      setWledEffects(effects);
      setWledPalettes(palettes);
      setWledStatus('connected');
    } catch(e) {
      setWledStatus('error');
      alert('Could not connect to WLED at ' + wledIp + '. Make sure your computer is on the same network as WLED (or StrollerNet).');
    }
  };

  const paletteKnown = sel && (
    wledPalettes.some(p => p.id === sel.wled.pal)
  );
  const sortedEffects = useMemo(
    () => [...wledEffects].sort((a, b) => a.name.localeCompare(b.name, undefined, { sensitivity: 'base' })),
    [wledEffects],
  );
  const filteredEffects = useMemo(() => {
    const q = effectFilter.trim().toLowerCase();
    if (!q) return sortedEffects;
    return sortedEffects.filter(e =>
      e.name.toLowerCase().includes(q) || String(e.id).includes(q),
    );
  }, [sortedEffects, effectFilter]);
  const paletteOptions = useMemo(
    () => buildPaletteSelectOptions(wledPalettes, sel?.wled, paletteKnown),
    [wledPalettes, sel?.wled, paletteKnown],
  );

  const testPreset = async (preset) => {
    setPresetTestErr('');
    setPresetTestStatus('testing');
    const ip = wledIp.trim();
    if (!ip) {
      setPresetTestStatus('error');
      setPresetTestErr('Enter a WLED IP in WLED Connect (left panel).');
      return;
    }
    localStorage.setItem('wled-ip', ip);
    try {
      await testPresetOnWled(ip, preset, data);
      setPresetTestStatus('ok');
      setTimeout(() => setPresetTestStatus('idle'), 2500);
    } catch {
      setPresetTestStatus('error');
      setPresetTestErr(`Could not reach WLED at ${ip}. Join StrollerNet or the same LAN as the controller.`);
    }
  };

  const applyPalettePick = (v) => {
    if (!v) {
      setSel(s => ({ ...s, wled: { ...s.wled, pal: undefined, palName: '' } }));
      return;
    }
    if (v.startsWith('wled:')) {
      const id = parseInt(v.slice(5), 10);
      const pal = wledPalettes.find(p => p.id === id);
      setSel(s => ({ ...s, wled: { ...s.wled, pal: id, palName: pal?.name || s.wled.palName } }));
    }
  };

  const savedColors = data.savedColors || [];
  const saveColor = (hex) => saveColorToLibrary(data, update, hex);
  const effectHexes = sel ? wledColToHexList(sel.wled.col) : [];
  const setEffectHexes = (hexes) => {
    const col = hexListToWledCol(hexes);
    setSel(s => ({
      ...s,
      wled: { ...s.wled, col },
      memory: { ...s.memory, color: hexes.length > 0 ? true : s.memory.color },
    }));
  };

  const toggleCaptureOpt = (k) => setCaptureOpts(o => ({ ...o, [k]: !o[k] }));
  const setAllCaptureOpts = (v) => setCaptureOpts(Object.fromEntries(Object.keys(DEFAULT_WLED_CAPTURE_OPTS).map(k => [k, v])));

  const runCaptureFromWled = async () => {
    if (!Object.values(captureOpts).some(Boolean)) {
      setCaptureErr('Select at least one property to import.');
      return;
    }
    setCapturing(true);
    setCaptureErr('');
    try {
      const ip = wledIp.trim();
      if (!ip) throw new Error('Enter a WLED IP in WLED Connect (left panel).');
      localStorage.setItem('wled-ip', ip);
      let effects = wledEffects;
      let palettes = wledPalettes;
      const state = await fetchWledFullStateFromIp(ip);
      if (!effects.length || !palettes.length) {
        try {
          const cat = await fetchWledCatalog(ip);
          effects = cat.effects;
          palettes = cat.palettes;
          setWledEffects(effects);
          setWledPalettes(palettes);
          setWledStatus('connected');
        } catch { /* names may fall back to IDs */ }
      }
      setSel(s => applyWledStateCapture(s, state, {
        effects, palettes,
      }, captureOpts, captureUpdateMemory));
      setShowCapture(false);
      setCaptureErr('');
    } catch (e) {
      setCaptureErr(e.message || 'Capture failed');
    } finally {
      setCapturing(false);
    }
  };

  return (<div style={{display:'flex',height:'100%'}}>
    {/* List */}
    <div style={{width:240,background:'var(--surface)',borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{padding:'10px 12px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontWeight:700,fontSize:14}}>Presets ({data.presets.length})</span>
        <button onClick={()=>{setSel(blank());setIsNew(true);setPtab('effect');}} style={btn('primary',{padding:'5px 12px',fontSize:12})}>+ New</button>
      </div>
      {/* WLED connect */}
      <div style={{padding:'8px 12px',borderBottom:'1px solid var(--border)',background:'var(--surface2)',display:'flex',flexDirection:'column',gap:6}}>
        <div style={{fontSize:10,fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:1}}>WLED Connect</div>
        <div style={{display:'flex',gap:4}}>
          <input value={wledIp} onChange={e=>setWledIp(e.target.value)} placeholder="192.168.x.x or 4.3.2.1"
            style={{...inputStyle,flex:1,padding:'5px 8px',fontSize:11}} onKeyDown={e=>e.key==='Enter'&&connectWled()}/>
          <button onClick={connectWled} style={btn(wledStatus==='connected'?'success':'primary',{padding:'5px 8px',fontSize:11,whiteSpace:'nowrap'})}>
            {wledStatus==='connecting'?'…':wledStatus==='connected'?'✓':wledStatus==='error'?'✕':'Go'}
          </button>
        </div>
        {wledStatus==='connected' && <div style={{fontSize:10,color:'var(--success)'}}>{wledEffects.length} effects · {wledPalettes.length} palettes loaded</div>}
        {wledStatus==='error' && <div style={{fontSize:10,color:'var(--danger)'}}>Connection failed — check IP and network</div>}
      </div>
      <TagFilterBar items={data.presets} search={search} onSearchChange={setSearch}
        activeTag={activeTag} onActiveTagChange={setActiveTag} />
      <div style={{overflowY:'auto',flex:1}}>
        {data.presets.length===0 && <div style={{padding:16,color:'var(--text3)',fontSize:13}}>No presets yet.</div>}
        {data.presets.length > 0 && filteredPresets.length === 0 && (
          <div style={{padding:16,color:'var(--text3)',fontSize:13}}>No matches.</div>
        )}
        {filteredPresets.map(p=>(<div key={p.id}
          onClick={()=>{setSel({...p,wled:{...p.wled},memory:{...p.memory}});setIsNew(false);setPtab('effect');setPresetTestStatus('idle');setPresetTestErr('');}}
          style={{padding:'10px 12px',borderBottom:'1px solid var(--border)',cursor:'pointer',background:sel?.id===p.id?'var(--primary-dim)':'transparent'}}>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,fontSize:13}}>{p.name}</div>
              <TagChipRow tags={p.tags} />
              <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>
                {p.wled.fxName||'—'} · {p.wled.palName||'—'}
                {p.segmentLayoutId && (() => {
                  const lay = (data.customSegmentLayouts||[]).find(l => l.id === p.segmentLayoutId);
                  return lay ? ` · ${lay.name}` : ' · layout';
                })()}
              </div>
            </div>
            <button type="button" title="Duplicate" onClick={e=>{e.stopPropagation();duplicatePreset(p);}}
              style={btn('',{padding:'4px 8px',fontSize:11,flexShrink:0})}>⧉</button>
            <button type="button" title="Test on strip" onClick={e=>{e.stopPropagation();testPreset(p);}}
              style={btn('primary',{padding:'4px 8px',fontSize:11,flexShrink:0})}>▶</button>
          </div>
        </div>))}
      </div>
    </div>

    {/* Edit panel */}
    {sel ? (<div style={{flex:1,overflowY:'auto',padding:20,display:'flex',flexDirection:'column',gap:12}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <input value={sel.name} onChange={e=>setSel({...sel,name:e.target.value})} placeholder="Preset name"
          style={{...inputStyle,fontSize:16,fontWeight:600,flex:1,marginRight:12}}/>
        <div style={{display:'flex',gap:8}}>
          <button type="button" onClick={() => { setCaptureOpts({ ...DEFAULT_WLED_CAPTURE_OPTS }); setCaptureErr(''); setShowCapture(true); }}
            style={btn('', { fontSize: 12 })} title="Import live strip state from WLED">
            Import from WLED
          </button>
          <button type="button" onClick={() => testPreset(sel)} disabled={presetTestStatus === 'testing'}
            style={btn(presetTestStatus === 'ok' ? 'success' : 'primary', { fontSize: 12 })}>
            {presetTestStatus === 'testing' ? 'Testing…' : presetTestStatus === 'ok' ? 'Sent ✓' : 'Test on strip'}
          </button>
          {!isNew && <button onClick={()=>del(sel.id)} style={btn('danger',{fontSize:12})}>Delete</button>}
          {!isNew && <button onClick={()=>duplicatePreset(sel)} style={btn('',{fontSize:12})}>Duplicate</button>}
          <button onClick={()=>setSel(null)} style={btn('',{fontSize:12})}>Cancel</button>
          <button onClick={save} style={btn('primary',{fontSize:12})}>Save</button>
        </div>
      </div>
      {presetTestErr && (
        <div style={{fontSize:12,color:'var(--danger)',padding:'8px 12px',background:'#ef444422',borderRadius:8,border:'1px solid var(--danger)'}}>
          {presetTestErr}
        </div>
      )}
      {!presetTestErr && presetTestStatus === 'ok' && (
        <div style={{fontSize:12,color:'var(--success)'}}>Preset sent to WLED at {wledIp.trim()}.</div>
      )}

      <TagEditor tags={sel.tags || []} onChange={tags => setSel({ ...sel, tags })} />

      {/* Sub-tabs */}
      <div style={{display:'flex',borderBottom:'1px solid var(--border)'}}>
        {['effect','palette','colors','segments','params','memory'].map(t=>(<button key={t} onClick={()=>setPtab(t)} style={{
          padding:'8px 16px',background:'none',border:'none',
          borderBottom:ptab===t?'2px solid var(--primary)':'2px solid transparent',
          color:ptab===t?'var(--primary)':'var(--text2)',fontWeight:600,fontSize:13,cursor:'pointer',
        }}>{t.charAt(0).toUpperCase()+t.slice(1)}</button>))}
      </div>

      {/* Effect tab */}
      {ptab==='effect' && (<div style={{maxWidth:520,display:'flex',flexDirection:'column',gap:12}}>
        {sel.wled.fx != null && sel.wled.fx !== '' && (
          <div style={{padding:'8px 12px',borderRadius:8,background:'var(--primary-dim)',border:'1px solid var(--border)'}}>
            <div style={{fontSize:11,color:'var(--text2)',marginBottom:2}}>Selected</div>
            <div style={{fontSize:14,fontWeight:600}}>
              {sel.wled.fxName || 'Unnamed effect'}
              <span style={{fontWeight:400,color:'var(--text3)',marginLeft:6}}>#{sel.wled.fx}</span>
            </div>
          </div>
        )}
        {wledEffects.length > 0 ? (<>
          <Field label={`Filter effects (${filteredEffects.length} of ${wledEffects.length})`}>
            <input value={effectFilter} onChange={e => setEffectFilter(e.target.value)}
              placeholder="Type to filter by name or ID…" style={inputStyle}/>
          </Field>
          <div style={{overflowY:'auto',maxHeight:360,border:'1px solid var(--border)',borderRadius:8}}>
            {filteredEffects.length === 0 && (
              <div style={{padding:16,color:'var(--text3)',fontSize:13,textAlign:'center'}}>No effects match</div>
            )}
            {filteredEffects.map(eff => (
              <div key={eff.id}
                onClick={() => setSel(s => ({ ...s, wled: { ...s.wled, fx: eff.id, fxName: eff.name } }))}
                style={{padding:'8px 12px',cursor:'pointer',fontSize:13,borderBottom:'1px solid var(--border)',
                  background: sel.wled.fx === eff.id ? 'var(--primary-dim)' : 'transparent',
                  color: sel.wled.fx === eff.id ? 'var(--primary)' : 'var(--text)'}}>
                {eff.name}
                <span style={{color:'var(--text3)',fontSize:11,marginLeft:6}}>#{eff.id}</span>
              </div>
            ))}
          </div>
          {sel.wled.fx != null && sel.wled.fx !== '' && (
            <button type="button" onClick={() => setSel(s => ({ ...s, wled: { ...s.wled, fx: undefined, fxName: '' } }))}
              style={btn('', { fontSize: 12, alignSelf: 'flex-start' })}>Clear selection</button>
          )}
        </>) : (
          <div style={{fontSize:11,color:'var(--text3)'}}>
            Use WLED Connect in the left panel to fetch the effect list. Lists are cached in the browser after the first successful connect.
          </div>
        )}
        <details style={{fontSize:12,color:'var(--text2)'}}>
          <summary style={{cursor:'pointer',userSelect:'none'}}>Manual override</summary>
          <div style={{display:'flex',flexDirection:'column',gap:8,marginTop:8}}>
            <Field label="Effect name">
              <input value={sel.wled.fxName||''} onChange={e=>w('fxName',e.target.value)} placeholder="e.g. Rainbow" style={inputStyle}/>
            </Field>
            <Field label="Effect ID">
              <input type="number" value={sel.wled.fx??''} onChange={e=>w('fx',e.target.value===''?undefined:parseInt(e.target.value,10))} placeholder="0" style={inputStyle}/>
            </Field>
          </div>
        </details>
      </div>)}

      {/* Palette tab */}
      {ptab==='palette' && (<div style={{maxWidth:520,display:'flex',flexDirection:'column',gap:12}}>
        <Field label="Color palette">
          <SearchableSelect value={paletteSelectValue(sel.wled)} onChange={applyPalettePick}
            placeholder="— Select palette —" maxListHeight={320}
            options={paletteOptions}/>
        </Field>
        {sel.wled.pal != null && sel.wled.pal !== '' && (
          <div style={{fontSize:12,color:'var(--text3)'}}>
            {sel.wled.palName || 'Unnamed palette'} · ID {sel.wled.pal}
          </div>
        )}
        {wledPalettes.length === 0 && (
          <div style={{fontSize:11,color:'var(--text3)'}}>
            Connect to WLED to load palette names from the controller catalog.
          </div>
        )}
        <details style={{fontSize:12,color:'var(--text2)'}}>
          <summary style={{cursor:'pointer',userSelect:'none'}}>Manual override</summary>
          <div style={{display:'flex',flexDirection:'column',gap:8,marginTop:8}}>
            <Field label="Palette name">
              <input value={sel.wled.palName||''} onChange={e=>w('palName',e.target.value)} placeholder="e.g. Rainbow" style={inputStyle}/>
            </Field>
            <Field label="Palette ID">
              <input type="number" value={sel.wled.pal??''} onChange={e=>w('pal',e.target.value===''?undefined:parseInt(e.target.value,10))} placeholder="0" style={inputStyle}/>
            </Field>
          </div>
        </details>
      </div>)}

      {/* Colors tab — WLED effect col */}
      {ptab==='colors' && (<div style={{maxWidth:520,display:'flex',flexDirection:'column',gap:12}}>
        <div style={{fontSize:12,color:'var(--text3)',lineHeight:1.5}}>
          Effect colors (WLED <code style={{fontFamily:'monospace'}}>col</code>). Used for solid, dual, triple, and similar effects.
          Honored when Settings → Recall State includes color (or preset memory has color checked).
        </div>
        {effectHexes.length === 0 && (
          <div style={{fontSize:12,color:'var(--text3)'}}>No effect colors set — add one for effects that use custom RGB instead of a palette.</div>
        )}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          {effectHexes.map((hex, i) => (
            <div key={i}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--text2)',marginBottom:6}}>Color {i + 1}</div>
              <ColorCell color={hex} savedColors={savedColors} onSaveColor={saveColor}
                onRemove={effectHexes.length > 1 ? () => {
                  const next = effectHexes.filter((_, j) => j !== i);
                  setEffectHexes(next);
                } : null}
                onChange={nc => {
                  const next = [...effectHexes];
                  next[i] = nc;
                  setEffectHexes(next);
                }}/>
            </div>
          ))}
        </div>
        {effectHexes.length < MAX_EFFECT_COLORS && (
          <button type="button" onClick={() => setEffectHexes([...effectHexes, '#ffffff'])}
            style={btn('', { alignSelf: 'flex-start', fontSize: 12 })}>+ Add color ({effectHexes.length}/{MAX_EFFECT_COLORS})</button>
        )}
        {effectHexes.length > 0 && (
          <button type="button" onClick={() => setEffectHexes([])}
            style={btn('danger', { alignSelf: 'flex-start', fontSize: 12 })}>Clear all colors</button>
        )}
        <Field label="Remember color at recall">
          <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,cursor:'pointer'}}>
            <input type="checkbox" checked={sel.memory.color} onChange={e=>m('color',e.target.checked)} style={{width:18,height:18}}/>
            Include in preset when global recall is &quot;memory&quot;
          </label>
        </Field>
      </div>)}

      {/* Segments tab — link saved layout library item */}
      {ptab==='segments' && (<div style={{display:'flex',flexDirection:'column',gap:10,maxWidth:520}}>
        <div style={{fontSize:12,color:'var(--text3)'}}>
          Linked layout applies when recall includes segments (Settings → Recall State). Import from WLED to capture inline layout, or pick a saved layout from Palettes → Segments.
        </div>
        {sel.wled.seg?.length > 0 && !sel.segmentLayoutId && (
          <div style={{padding:'10px 12px',borderRadius:8,border:'1px solid var(--primary)',background:'var(--primary-dim)'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
              <span style={{fontSize:13,fontWeight:600,flex:1}}>Inline layout (imported)</span>
              <button type="button" onClick={() => setSel(s => ({ ...s, wled: { ...s.wled, seg: undefined }, memory: { ...s.memory, segments: false } }))}
                style={btn('danger',{fontSize:10,padding:'3px 8px'})}>Clear</button>
            </div>
            <SegmentBar segments={sel.wled.seg}/>
            <div style={{fontSize:10,color:'var(--text3)',marginTop:4,fontFamily:'monospace'}}>
              {sel.wled.seg.map(s => {
                const fxPart = s.fx != null ? `fx:${s.fx}` : `fx:${sel.wled.fx ?? '-'}`;
                const palPart = s.pal != null ? `pal:${s.pal}` : `pal:${sel.wled.pal ?? '-'}`;
                return `${formatSegLabel(s)} · ${fxPart} · ${palPart}`;
              }).join(' · ')}
            </div>
          </div>
        )}
        <div onClick={()=>setSel(s=>({...s,segmentLayoutId:undefined,wled:{...s.wled,seg:undefined},memory:{...s.memory,segments:false}}))}
          style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',borderRadius:8,cursor:'pointer',
            background:!sel.segmentLayoutId&&!sel.wled.seg?.length?'var(--primary-dim)':'var(--surface2)',border:'1px solid var(--border)'}}>
          <span style={{fontSize:13,flex:1}}>None (single segment only)</span>
          {!sel.segmentLayoutId&&!sel.wled.seg?.length && <span style={{color:'var(--primary)'}}>✓</span>}
        </div>
        {(data.customSegmentLayouts||[]).length===0 && (
          <div style={{fontSize:12,color:'var(--text3)'}}>No segment layouts yet — add them on the Palettes tab.</div>
        )}
        {(data.customSegmentLayouts||[]).map(layout=>(
          <div key={layout.id} onClick={()=>setSel(s=>({
            ...s, segmentLayoutId: layout.id, memory: { ...s.memory, segments: true },
            wled: { ...s.wled, seg: undefined },
          }))}
            style={{padding:'10px 12px',borderRadius:8,cursor:'pointer',border:'1px solid var(--border)',
              background:sel.segmentLayoutId===layout.id?'var(--primary-dim)':'var(--surface2)'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
              <span style={{fontSize:13,fontWeight:600,flex:1}}>{layout.name}</span>
              {sel.segmentLayoutId===layout.id && <span style={{color:'var(--primary)'}}>✓</span>}
            </div>
            <SegmentBar segments={layout.segments}/>
            <div style={{fontSize:10,color:'var(--text3)',marginTop:4,fontFamily:'monospace'}}>{summarizeLayout(layout)}</div>
          </div>
        ))}
        {(sel.segmentLayoutId || sel.wled.seg?.length > 0) && (
          <Field label="Remember segments at recall">
            <input type="checkbox" checked={sel.memory.segments} onChange={e=>m('segments',e.target.checked)} style={{width:18,height:18}}/>
          </Field>
        )}
      </div>)}

      {/* Params tab */}
      {ptab==='params' && (<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        {[{k:'sx',label:'Speed',max:255},{k:'ix',label:'Intensity',max:255},{k:'c1',label:'Custom 1',max:255},{k:'c2',label:'Custom 2',max:255},{k:'c3',label:'Custom 3',max:31}].map(({k,label,max})=>(<Field key={k} label={`${label}: ${sel.wled[k]??128}`}>
          <input type="range" min={0} max={max} value={sel.wled[k]??128} onChange={e=>w(k,+e.target.value)} style={{width:'100%',accentColor:'var(--primary)'}}/>
        </Field>))}
        {[{k:'o1',label:'Option 1'},{k:'o2',label:'Option 2'},{k:'o3',label:'Option 3'}].map(({k,label})=>(<Field key={k} label={label}>
          <input type="checkbox" checked={sel.wled[k]||false} onChange={e=>w(k,e.target.checked)} style={{width:18,height:18}}/>
        </Field>))}
      </div>)}

      {/* Memory tab */}
      {ptab==='memory' && (<div style={{display:'flex',flexDirection:'column',gap:8}}>
        <div style={{fontSize:12,color:'var(--text3)',marginBottom:4,lineHeight:1.5}}>
          When global recall is &quot;memory&quot;, only checked properties are applied from this preset.
          Use <strong>Import from WLED</strong> to snapshot the live strip and optionally sync these flags.
        </div>
        {Object.keys(sel.memory).map(k=>(<div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
          <span style={{fontSize:13,textTransform:'capitalize'}}>{k}</span>
          <input type="checkbox" checked={sel.memory[k]} onChange={e=>m(k,e.target.checked)} style={{width:18,height:18}}/>
        </div>))}
        <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>Zone assignments using this preset:</div>
        {data.zones.filter(z=>z.presetId===sel.id).map(z=>(<div key={z.id} style={{fontSize:12,color:'var(--primary)',padding:'2px 0'}}>📍 {z.name}</div>))}
      </div>)}
    </div>) : (<div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text3)',fontSize:14}}>
      Select a preset or click + New
    </div>)}

    {showCapture && sel && (
      <Modal title="Import from WLED" onClose={() => { setShowCapture(false); setCaptureErr(''); }} width={440}>
        <p style={{ fontSize: 12, color: 'var(--text3)', lineHeight: 1.55, margin: 0 }}>
          Reads the current strip at <code style={{ fontFamily: 'monospace' }}>{wledIp.trim() || '…'}</code> via{' '}
          <code style={{ fontFamily: 'monospace' }}>/json/state</code>. Only checked fields overwrite this preset; others stay as-is.
        </p>
        <div style={{ display: 'flex', gap: 8, fontSize: 11 }}>
          <button type="button" onClick={() => setAllCaptureOpts(true)} style={btn('', { padding: '4px 10px', fontSize: 11 })}>Select all</button>
          <button type="button" onClick={() => setAllCaptureOpts(false)} style={btn('', { padding: '4px 10px', fontSize: 11 })}>Clear all</button>
        </div>
        {Object.entries(wledCaptureLabels()).map(([key, { title, hint }]) => (
          <label key={key} style={{ display: 'flex', gap: 10, alignItems: 'flex-start', padding: '8px 10px', borderRadius: 8, background: 'var(--surface2)', cursor: 'pointer' }}>
            <input type="checkbox" checked={!!captureOpts[key]} onChange={() => toggleCaptureOpt(key)} style={{ width: 16, height: 16, marginTop: 2, flexShrink: 0 }}/>
            <div>
              <div style={{ fontSize: 13, fontWeight: 600 }}>{title}</div>
              <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 2 }}>{hint}</div>
            </div>
          </label>
        ))}
        <label style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 12, cursor: 'pointer', marginTop: 4 }}>
          <input type="checkbox" checked={captureUpdateMemory} onChange={e => setCaptureUpdateMemory(e.target.checked)} style={{ width: 16, height: 16 }}/>
          Update Memory tab flags for imported fields
        </label>
        {captureErr && <div style={{ fontSize: 12, color: 'var(--danger)' }}>{captureErr}</div>}
        <div style={{ display: 'flex', gap: 8, marginTop: 4 }}>
          <button type="button" onClick={() => { setShowCapture(false); setCaptureErr(''); }} style={btn('', { flex: 1 })} disabled={capturing}>Cancel</button>
          <button type="button" onClick={runCaptureFromWled} style={btn('primary', { flex: 1 })} disabled={capturing}>
            {capturing ? 'Reading…' : 'Import'}
          </button>
        </div>
      </Modal>
    )}
  </div>);
}


// ── ColorCell component ─────────────────────────────────────────────────
const PALETTE_SWATCHES = [
  '#ff0000','#ff4400','#ff8800','#ffcc00','#ffff00','#aaff00',
  '#00ff00','#00ff88','#00ffff','#0088ff','#0044ff','#6600ff',
  '#aa00ff','#ff00ff','#ff0088','#ffffff','#cccccc','#888888',
  '#444444','#000000','#ff6666','#66ff66','#6666ff','#ffaa44',
];

function ColorCell({ color, onChange, onRemove, savedColors, onSaveColor }) {
  const [mode, setMode] = useState('swatches'); // swatches | hex | rgb | hsl
  const rgb = hexToRgb(color || '#000000');
  const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
  const [hexInput, setHexInput] = useState(color);
  const library = savedColors || [];

  useEffect(() => { setHexInput(color); }, [color]);

  const applyHex = (v) => {
    const h = normalizeHex(v);
    if (h) onChange(h);
    setHexInput(v);
  };

  const applyRgb = (r, g, b) => onChange(rgbToHex(r, g, b));

  const applyHsl = (h, s, l) => {
    const next = hslToRgb(h, s, l);
    applyRgb(next.r, next.g, next.b);
  };

  const channelRow = (ch, val, min, max, accent, onVal) => (
    <div key={ch} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
      <span style={{ fontSize: 11, fontWeight: 700, color: 'var(--text2)', width: 14 }}>{ch}</span>
      <input type="number" min={min} max={max} value={val}
        onChange={e => onVal(Math.max(min, Math.min(max, parseInt(e.target.value, 10) || 0)))}
        style={{ ...inputStyle, width: 56, textAlign: 'right', fontSize: 12, padding: '4px 6px', fontFamily: 'monospace' }}/>
      <input type="range" min={min} max={max} value={val}
        onChange={e => onVal(+e.target.value)}
        style={{ flex: 1, accentColor: accent, height: 16 }}/>
    </div>
  );

  const saveCurrent = () => {
    if (onSaveColor) onSaveColor(color);
  };

  return (<div style={{background:'var(--surface2)',borderRadius:10,padding:10,display:'flex',flexDirection:'column',gap:8}}>
    {/* Color preview */}
    <div style={{height:44,borderRadius:7,background:color,border:'1px solid var(--border)',position:'relative',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <span style={{color:'#ffffff',fontSize:11,fontFamily:'monospace',textShadow:'0 1px 3px #000000aa'}}>{color}</span>
    </div>
    {/* Mode selector */}
    <div style={{display:'flex',gap:0,background:'var(--surface)',borderRadius:6,overflow:'hidden',border:'1px solid var(--border)'}}>
      {['swatches','hex','rgb','hsl'].map(m=>(<button key={m} onClick={()=>setMode(m)} style={{
        flex:1,padding:'4px 0',fontSize:11,fontWeight:600,border:'none',cursor:'pointer',
        background:mode===m?'var(--primary)':'transparent',
        color:mode===m?'#fff':'var(--text2)',
      }}>{m.charAt(0).toUpperCase()+m.slice(1)}</button>))}
    </div>

    {library.length > 0 && (
      <div>
        <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:0.5,marginBottom:4}}>Saved colors</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
          {library.map(sc => (
            <div key={sc.id} title={sc.name} onClick={() => onChange(sc.hex)}
              style={{width:20,height:20,borderRadius:3,background:sc.hex,cursor:'pointer',flexShrink:0,
                outline:sc.hex.toLowerCase()===color.toLowerCase()?'2px solid white':'1px solid #ffffff22',outlineOffset:1}}/>
          ))}
        </div>
      </div>
    )}

    {mode==='swatches' && (<div style={{display:'flex',flexWrap:'wrap',gap:3}}>
      {PALETTE_SWATCHES.map(sw=>(<div key={sw} onClick={()=>onChange(sw)}
        style={{width:20,height:20,borderRadius:3,background:sw,cursor:'pointer',flexShrink:0,
          outline:sw.toLowerCase()===color.toLowerCase()?'2px solid white':'1px solid #ffffff22',outlineOffset:1}}/>))}
      <label style={{width:20,height:20,borderRadius:3,overflow:'hidden',cursor:'pointer',border:'2px dashed var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'var(--text3)',title:'Custom'}}>
        <input type="color" value={color} onChange={e=>onChange(e.target.value)} style={{width:0,height:0,opacity:0,position:'absolute'}}/>+
      </label>
    </div>)}

    {mode==='hex' && (<div style={{display:'flex',gap:6,alignItems:'center'}}>
      <div style={{width:28,height:28,borderRadius:5,background:color,border:'1px solid var(--border)',flexShrink:0}}/>
      <input value={hexInput} onChange={e=>applyHex(e.target.value)}
        placeholder="#rrggbb" maxLength={7}
        style={{...inputStyle,fontFamily:'monospace',fontSize:13,flex:1,padding:'5px 8px'}}/>
    </div>)}

    {mode==='rgb' && (<div style={{display:'flex',flexDirection:'column',gap:6}}>
      {channelRow('R', rgb.r, 0, 255, '#ff4444', nv => applyRgb(nv, rgb.g, rgb.b))}
      {channelRow('G', rgb.g, 0, 255, '#44ff44', nv => applyRgb(rgb.r, nv, rgb.b))}
      {channelRow('B', rgb.b, 0, 255, '#4488ff', nv => applyRgb(rgb.r, rgb.g, nv))}
    </div>)}

    {mode==='hsl' && (<div style={{display:'flex',flexDirection:'column',gap:6}}>
      {channelRow('H', hsl.h, 0, 360, '#cc88ff', nv => applyHsl(nv, hsl.s, hsl.l))}
      {channelRow('S', hsl.s, 0, 100, '#ff8844', nv => applyHsl(hsl.h, nv, hsl.l))}
      {channelRow('L', hsl.l, 0, 100, '#aaaaaa', nv => applyHsl(hsl.h, hsl.s, nv))}
    </div>)}

    <div style={{display:'flex',gap:6}}>
      {onSaveColor && (
        <button type="button" onClick={saveCurrent} style={btn('', { flex: 1, padding: '4px 0', fontSize: 11 })}>Save to library</button>
      )}
      {onRemove && (
        <button type="button" onClick={onRemove} style={btn('danger', { flex: 1, padding: '4px 0', fontSize: 11 })}>Remove</button>
      )}
    </div>
  </div>);
}

function ColorInput({ value, onChange, savedColors, onSaveColor }) {
  const [showPicker, setShowPicker] = useState(false);
  const library = savedColors || [];

  if (showPicker) {
    return (
      <div style={{ marginTop: 4 }}>
        <ColorCell color={value} onChange={onChange} savedColors={savedColors} onSaveColor={onSaveColor} />
        <button type="button" onClick={() => setShowPicker(false)} style={{ ...btn('', { width: '100%', marginTop: 6, fontSize: 11 }) }}>Done</button>
      </div>
    );
  }

  return (
    <div style={{ minWidth: 0 }}>
      <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
        <div role="button" tabIndex={0} onClick={() => setShowPicker(true)}
          style={{ width: 24, height: 24, borderRadius: 4, background: value, border: '1px solid var(--border)', cursor: 'pointer', flexShrink: 0 }}/>
        <input value={value}
          onChange={e => { const v = e.target.value; if (/^#?[0-9a-fA-F]{6}$/.test(v)) onChange(v.startsWith('#') ? v : `#${v}`); }}
          style={{ ...inputStyle, width: 88, padding: '4px 6px', fontSize: 11, fontFamily: 'monospace' }}/>
        <button type="button" onClick={() => setShowPicker(true)} title="Full picker"
          style={btn('', { padding: '4px 8px', fontSize: 11 })}>⋯</button>
        {onSaveColor && (
          <button type="button" onClick={() => onSaveColor(value)} title="Save to library"
            style={btn('', { padding: '4px 8px', fontSize: 11 })}>★</button>
        )}
      </div>
      {library.length > 0 && (
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 2, marginTop: 4 }}>
          {library.map(sc => (
            <div key={sc.id} title={sc.name} onClick={() => onChange(sc.hex)}
              style={{ width: 14, height: 14, borderRadius: 2, background: sc.hex, cursor: 'pointer', border: '1px solid #ffffff22' }}/>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Palettes ───────────────────────────────────────────────────────
function PalettesTab({data, update}) {
  const layouts  = data.customSegmentLayouts || [];
  const savedColors = data.savedColors || [];
  const [ptab, setPtab] = useState('segments');
  const [editL, setEditL] = useState(null);
  const [editSc, setEditSc] = useState(null);
  const [isNew, setIsNew] = useState(false);
  const [search, setSearch] = useState('');
  const [activeTag, setActiveTag] = useState(null);
  const [wledIp, setWledIp] = useState(() => localStorage.getItem('wled-ip') || '4.3.2.1');
  const [capturing, setCapturing] = useState(false);
  const saveColor = (hex) => saveColorToLibrary(data, update, hex);

  const listItems = ptab === 'colors' ? savedColors : layouts;
  const filteredList = useMemo(
    () => listItems.filter(item => itemMatchesTagFilter(item, search, activeTag)),
    [listItems, search, activeTag],
  );

  const blankSavedColor = () => ({ id: generateId(), name: '', hex: '#ffffff', tags: [] });
  const blankLayout = () => ({
    id: generateId(), name: '', createdAt: Date.now(),
    segments: [{ id: 0, start: 0, stop: STRIP_LED_COUNT }],
  });

  const saveSc = () => {
    if (!editSc.name.trim()) return alert('Enter a name');
    const hex = normalizeHex(editSc.hex);
    if (!hex) return alert('Enter a valid hex color');
    const entry = { ...editSc, name: editSc.name.trim(), hex };
    update({ savedColors: isNew ? [...savedColors, entry] : savedColors.map(c => c.id === entry.id ? entry : c) });
    setEditSc(null);
  };
  const delSc = id => {
    if (!confirm('Delete saved color?')) return;
    update({ savedColors: savedColors.filter(c => c.id !== id) });
    setEditSc(null);
  };

  const duplicateSc = (c) => {
    const copy = {
      ...c,
      id: generateId(),
      name: duplicateTaggedName(c.name),
      hex: c.hex,
      tags: [...(c.tags || [])],
    };
    update({ savedColors: [...savedColors, copy] });
    setEditSc(copy);
    setIsNew(false);
  };

  const saveLayout = () => {
    if (!editL.name.trim()) return alert('Enter a name');
    if (!(editL.segments || []).some(isActiveSegment)) return alert('Add at least one active segment');
    update({ customSegmentLayouts: isNew ? [...layouts, editL] : layouts.map(l => l.id === editL.id ? editL : l) });
    setEditL(null);
  };
  const delLayout = id => {
    if (!confirm('Delete this segment layout?')) return;
    update({
      customSegmentLayouts: layouts.filter(l => l.id !== id),
      presets: (data.presets || []).map(p => p.segmentLayoutId === id ? { ...p, segmentLayoutId: undefined } : p),
    });
    setEditL(null);
  };

  const updateLayoutSeg = (idx, patch) => {
    setEditL(l => ({ ...l, segments: l.segments.map((s, i) => i === idx ? { ...s, ...patch } : s) }));
  };

  const captureFromWled = async () => {
    localStorage.setItem('wled-ip', wledIp.trim());
    setCapturing(true);
    try {
      const state = await fetchWledFullStateFromIp(wledIp);
      const segments = parseWledStateSegments(state).map(seg => captureSegmentFromRaw(seg, {
        effect: true, palette: true, parameters: true, color: true, segments: true,
      }));
      setEditL(l => l ? { ...l, segments } : { ...blankLayout(), segments });
    } catch (e) {
      alert(e.message || 'Capture failed');
    } finally {
      setCapturing(false);
    }
  };

  const applyLayout = async (layout) => {
    localStorage.setItem('wled-ip', wledIp.trim());
    try {
      await postWledState(wledIp, buildLayoutPayload(layout));
    } catch (e) {
      alert(e.message || 'Apply failed');
    }
  };

  return <div style={{display:'flex',height:'100%'}}>
    {/* List panel */}
    <div style={{width:260,background:'var(--surface)',borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column'}}>
      <div style={{display:'flex',borderBottom:'1px solid var(--border)'}}>
        {['segments','colors'].map(t=>(<button key={t} onClick={()=>{setPtab(t);setEditL(null);setEditSc(null);setSearch('');setActiveTag(null);}} style={{
          flex:1,padding:'10px 0',background:'none',border:'none',borderBottom:ptab===t?'2px solid var(--primary)':'2px solid transparent',
          color:ptab===t?'var(--primary)':'var(--text2)',fontWeight:600,fontSize:12,cursor:'pointer',marginBottom:-1,
        }}>{t==='colors'?`Colors (${savedColors.length})`:`Segments (${layouts.length})`}</button>))}
      </div>
      {listItems.length > 0 && (
        <TagFilterBar items={listItems} search={search} onSearchChange={setSearch}
          activeTag={activeTag} onActiveTagChange={setActiveTag} />
      )}
      <div style={{overflowY:'auto',flex:1,padding:10}}>
        {ptab==='colors' && <>
          <button onClick={()=>{setEditSc(blankSavedColor());setIsNew(true);}} style={{...btn('primary'),width:'100%',marginBottom:10,fontSize:12}}>+ New Saved Color</button>
          {savedColors.length===0 && <div style={{fontSize:12,color:'var(--text3)'}}>No saved colors yet — save from any color picker or add one here.</div>}
          {savedColors.length > 0 && filteredList.length === 0 && <div style={{fontSize:12,color:'var(--text3)'}}>No matches</div>}
          {filteredList.map(c=>(<div key={c.id} onClick={()=>{setEditSc({...c});setIsNew(false);}}
            style={{...cardStyle,cursor:'pointer',background:editSc?.id===c.id?'var(--primary-dim)':'var(--surface)',marginBottom:8,display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:28,height:28,borderRadius:6,background:c.hex,border:'1px solid var(--border)',flexShrink:0}}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,fontSize:13}}>{c.name}</div>
              <TagChipRow tags={c.tags} />
              <div style={{fontSize:11,color:'var(--text3)',fontFamily:'monospace'}}>{c.hex}</div>
            </div>
            <button type="button" title="Duplicate" onClick={e => { e.stopPropagation(); duplicateSc(c); }}
              style={btn('',{padding:'4px 8px',fontSize:11,flexShrink:0})}>⧉</button>
          </div>))}
        </>}
        {ptab==='segments' && <>

function formatWledSegLabel(seg) {
  return formatSegLabel(seg);
}

function formatWledSegSelectionSummary(refs) {
  if (!refs?.length) return 'None assigned';
  return refs.map(formatSegLabel).join(' · ');
}

function isValidSegRef(ref) {
  return Number.isInteger(ref.id) && ref.id >= 0 && ref.id <= 31
    && Number.isInteger(ref.start) && Number.isInteger(ref.stop)
    && ref.start >= 0 && ref.stop <= STRIP_LED_COUNT && ref.stop > ref.start;
}

function parseSegRefFields(idStr, startStr, stopStr) {
  const id = parseInt(idStr, 10);
  const start = parseInt(startStr, 10);
  const stop = parseInt(stopStr, 10);
  const ref = { id, start, stop };
  return isValidSegRef(ref) ? ref : null;
}

function defaultNewSegRef(refs) {
  const used = new Set((refs || []).map(r => r.id));
  let id = 0;
  while (used.has(id) && id < 32) id++;
  return { id, start: 0, stop: STRIP_LED_COUNT };
}

function refsFromSnapshotIds(snapshot, selectedIds) {
  const set = new Set(selectedIds);
  return snapshot.filter(s => set.has(s.id)).map(s => ({ id: s.id, start: s.start, stop: s.stop }));
}

function updateRefAt(refs, index, ref) {
  const next = [...(refs || [])];
  next[index] = ref;
  return next;
}

function removeRefAt(refs, index) {
  return (refs || []).filter((_, i) => i !== index);
}

function appendSegRef(refs, ref) {
  const without = (refs || []).filter(r => r.id !== ref.id);
  return [...without, ref];
}

function toggleSnapshotSelection(snapshot, currentRefs, wledSegId) {
  const seg = snapshot.find(s => s.id === wledSegId);
  if (!seg) return currentRefs || [];
  const refs = currentRefs || [];
  if (refs.some(r => r.id === wledSegId)) return refs.filter(r => r.id !== wledSegId);
  return appendSegRef(refs, { id: seg.id, start: seg.start, stop: seg.stop });
}

function pruneRefsToSnapshot(snapshot, refs) {
  const list = refs || [];
  const snapIds = new Set(snapshot.map(s => s.id));
  const manual = list.filter(r => !snapIds.has(r.id));
  const fromSnap = refsFromSnapshotIds(
    snapshot,
    list.map(r => r.id).filter(id => snapIds.has(id)),
  );
  return [...manual, ...fromSnap];
}

function buildPresetLayoutPayload(preset, customSegmentLayouts) {
  if (!preset) return null;
  const wled = presetWledForBoard(preset, customSegmentLayouts);
  if (!wled.seg?.length) return null;
  return { on: true, seg: wled.seg.map(s => ({ ...s })) };
}

function WledSegEditor({label, hint, simCommand, refs, onChange, onTest, onCapture, captureLoading, canCapture, snapshot}) {
  const selectedSummary = formatWledSegSelectionSummary(refs);
  const toggle = (wledSegId) => onChange(toggleSnapshotSelection(snapshot, refs, wledSegId));
  const hasSnapshot = snapshot?.length > 0;
  const list = refs || [];

  const patchRef = (index, field, raw) => {
    const cur = list[index];
    if (!cur) return;
    const idStr = field === 'id' ? raw : String(cur.id);
    const startStr = field === 'start' ? raw : String(cur.start);
    const stopStr = field === 'stop' ? raw : String(cur.stop);
    const parsed = parseSegRefFields(idStr, startStr, stopStr);
    if (parsed) onChange(updateRefAt(list, index, parsed));
    else onChange(updateRefAt(list, index, {
      id: field === 'id' ? parseInt(raw, 10) || 0 : cur.id,
      start: field === 'start' ? parseInt(raw, 10) || 0 : cur.start,
      stop: field === 'stop' ? parseInt(raw, 10) || 0 : cur.stop,
    }));
  };

  const segInput = { width: 44, padding: '4px 6px', fontSize: 12, fontFamily: 'monospace', textAlign: 'center',
    background: 'var(--bg)', border: '1px solid var(--border)', borderRadius: 4, color: 'var(--text)' };

  return (
    <div style={{ marginBottom: 14, padding: 10, background: 'var(--surface2)', borderRadius: 8 }}>
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 8, marginBottom: 6 }}>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 2 }}>{label}</div>
          <div style={{ fontSize: 11, color: 'var(--text3)', marginBottom: 2 }}>{hint}</div>
          {simCommand && <div style={{ fontSize: 10, color: 'var(--text3)', fontFamily: 'monospace' }}>WandSim: {simCommand}</div>}
          <div style={{ fontSize: 11, color: 'var(--primary)', fontWeight: 600, marginTop: 6, fontFamily: 'monospace' }}>
            → {selectedSummary}
          </div>
        </div>
        <div style={{ display: 'flex', gap: 6, flexShrink: 0 }}>
          {onCapture && (
            <button type="button" onClick={onCapture} disabled={!canCapture || captureLoading}
              style={btn('', { padding: '4px 10px', fontSize: 11, whiteSpace: 'nowrap', background: 'var(--bg)', border: '1px solid var(--border)' })}>
              {captureLoading ? '…' : hasSnapshot ? '↻ Capture' : 'Capture'}
            </button>
          )}
          {onTest && (
            <button type="button" onClick={onTest} style={btn('primary', { padding: '4px 10px', fontSize: 11, whiteSpace: 'nowrap' })}>
              Test
            </button>
          )}
        </div>
      </div>

      <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text2)', marginBottom: 6 }}>Assigned segments</div>
      {list.length === 0 ? (
        <div style={{ fontSize: 11, color: 'var(--text3)', marginBottom: 8 }}>No segments — add manually or capture from WLED.</div>
      ) : list.map((ref, index) => (
        <div key={`${ref.id}-${index}`} style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 6, flexWrap: 'wrap' }}>
          <span style={{ fontSize: 10, color: 'var(--text3)' }}>id</span>
          <input style={{ ...segInput, width: 36 }} value={ref.id} inputMode="numeric"
            onChange={e => patchRef(index, 'id', e.target.value)} />
          <span style={{ fontSize: 10, color: 'var(--text3)' }}>start LED</span>
          <input style={segInput} value={ref.start} inputMode="numeric"
            onChange={e => patchRef(index, 'start', e.target.value)} />
          <span style={{ fontSize: 10, color: 'var(--text3)' }}>stop LED</span>
          <input style={segInput} value={ref.stop} inputMode="numeric"
            onChange={e => patchRef(index, 'stop', e.target.value)} />
          {!isValidSegRef(ref) ? (
            <span style={{ fontSize: 10, color: 'var(--danger)' }}>invalid</span>
          ) : (
            <span style={{ fontSize: 10, color: 'var(--text3)' }}>ok</span>
          )}
          <button type="button" onClick={() => onChange(removeRefAt(list, index))}
            style={btn('', { padding: '2px 8px', fontSize: 14, color: 'var(--danger)', background: 'none', border: 'none' })}>×</button>
        </div>
      ))}
      <button type="button" onClick={() => onChange(appendSegRef(list, defaultNewSegRef(list)))}
        style={btn('', { padding: '4px 0', fontSize: 12, fontWeight: 600, color: 'var(--primary)', background: 'none', border: 'none', marginBottom: hasSnapshot ? 10 : 0 })}>
        + Add segment
      </button>

      {hasSnapshot && (
        <>
          <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text2)', marginBottom: 4, marginTop: 4 }}>From capture</div>
          <div style={{ fontSize: 10, color: 'var(--text2)', fontFamily: 'monospace', marginBottom: 8, lineHeight: 1.4 }}>
            {snapshot.map(formatWledSegLabel).join(' · ')}
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
            {snapshot.map(seg => {
              const checked = list.some(r => r.id === seg.id);
              return (
                <label key={seg.id} style={{
                  display: 'flex', alignItems: 'center', gap: 8, padding: '6px 8px', borderRadius: 6, cursor: 'pointer',
                  background: checked ? 'var(--primary-dim)' : 'var(--bg)',
                  border: `1px solid ${checked ? 'var(--primary)' : 'var(--border)'}`,
                }}>
                  <input type="checkbox" checked={checked} onChange={() => toggle(seg.id)} style={{ width: 16, height: 16 }} />
                  <span style={{ fontSize: 12, fontFamily: 'monospace', color: checked ? 'var(--primary)' : 'var(--text2)' }}>
                    {formatWledSegLabel(seg)}
                  </span>
                </label>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}
